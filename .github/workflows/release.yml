# Build and release the Hookie CLI on tag push (e.g. v0.0.1).
# Publishes: GoReleaser artifacts to GitHub Release, then @hookie-sh/cli to npm.
# Requires CLERK_PUBLISHABLE_KEY and NPM_TOKEN in repo Actions secrets.
#
# Idempotent retries:
# - Re-run a failed workflow on the same tag: skips GoReleaser if the GitHub
#   release already exists; skips npm publish if the version is already on npm.
# - Manual npm-only retry: Actions → Release CLI → Run workflow → tag + npm_only.
name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.1). Required for manual runs."
        required: true
        type: string
      npm_only:
        description: "Skip GoReleaser; publish npm only (GitHub release must already exist)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release CLI
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      VERSION: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Check if GitHub release already exists
        id: github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub release $VERSION already exists; skipping GoReleaser."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build GUI (embedded in CLI)
        if: ${{ inputs.npm_only != true && steps.github_release.outputs.exists != 'true' }}
        run: |
          cd packages/gui && pnpm exec vite build
          rm -rf internal/gui/dist
          cp -r packages/gui/dist internal/gui/dist

      - name: Set up Go
        if: ${{ inputs.npm_only != true && steps.github_release.outputs.exists != 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        if: ${{ inputs.npm_only != true && steps.github_release.outputs.exists != 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set package version from tag
        working-directory: packages/cli
        run: |
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish @hookie-sh/cli to npm
        working-directory: packages/cli
        run: |
          VERSION="${VERSION#v}"
          if npm view "@hookie-sh/cli@${VERSION}" version >/dev/null 2>&1; then
            echo "Already published @hookie-sh/cli@${VERSION}; skipping npm publish."
            exit 0
          fi
          npm publish --access public

      - name: Release summary
        run: |
          VERSION="${VERSION#v}"
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.github_release.outputs.exists }}" = "true" ]; then
            echo "- GitHub Release: already existed (GoReleaser skipped)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- GitHub Release: https://github.com/hookie-sh/cli/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- npm: \`@hookie-sh/cli@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
