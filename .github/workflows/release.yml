# Build and release the Hookie CLI on tag push (e.g. v0.0.1).
# Publishes: GoReleaser artifacts to GitHub Release, then stages @hookie-sh/cli on npm.
# Requires CLERK_PUBLISHABLE_KEY in repo Actions secrets.
#
# npm uses trusted publishing (OIDC) + staged publish — no NPM_TOKEN. Configure on
# npmjs.com: trusted publisher for hookie-sh/cli + release.yml (npm stage publish only),
# and publishing access "require 2FA and disallow tokens". A maintainer must approve
# staged versions: npm stage approve @hookie-sh/cli@X.Y.Z (or npmjs.com → Staged Packages).
#
# Idempotent retries:
# - Re-run a failed workflow on the same tag: skips GoReleaser if the GitHub
#   release already exists; skips npm stage if the version is published or already staged.
# - Manual npm-only retry: Actions → Release CLI → Run workflow → tag + npm_only.
name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.1). Required for manual runs."
        required: true
        type: string
      npm_only:
        description: "Skip GoReleaser; stage npm only (GitHub release must already exist)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release CLI
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Check if GitHub release already exists
        id: github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub release $VERSION already exists; skipping GoReleaser."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build GUI (embedded in CLI)
        if: ${{ inputs.npm_only != true && steps.github_release.outputs.exists != 'true' }}
        run: |
          (cd packages/gui && pnpm exec vite build)
          rm -rf internal/gui/dist
          cp -r packages/gui/dist internal/gui/dist

      - name: Set up Go
        if: ${{ inputs.npm_only != true && steps.github_release.outputs.exists != 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        if: ${{ inputs.npm_only != true && steps.github_release.outputs.exists != 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set package version from tag
        working-directory: packages/cli
        run: |
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Ensure npm supports staged publishing
        run: |
          NPM_MAJOR="$(npm -v | cut -d. -f1)"
          NPM_MINOR="$(npm -v | cut -d. -f2)"
          if [ "$NPM_MAJOR" -lt 11 ] || { [ "$NPM_MAJOR" -eq 11 ] && [ "$NPM_MINOR" -lt 15 ]; }; then
            echo "npm $(npm -v) is too old; staged publishing requires npm 11.15.0+"
            exit 1
          fi

      - name: Stage @hookie-sh/cli on npm
        working-directory: packages/cli
        run: |
          VERSION="${VERSION#v}"
          PKG="@hookie-sh/cli@${VERSION}"

          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "Already published $PKG; skipping npm stage publish."
            exit 0
          fi

          if npm stage view "$PKG" >/dev/null 2>&1; then
            echo "Already staged $PKG; approve with: npm stage approve $PKG"
            exit 0
          fi

          set +e
          npm stage publish --access public 2>&1 | tee /tmp/npm-stage.log
          STATUS="${PIPESTATUS[0]}"
          set -e

          if [ "$STATUS" -ne 0 ]; then
            if grep -qiE 'already staged|EEXIST|cannot stage' /tmp/npm-stage.log; then
              echo "Version already staged; approve with: npm stage approve $PKG"
              exit 0
            fi
            exit "$STATUS"
          fi

          echo "Staged $PKG. Maintainer must approve with 2FA before it is installable."

      - name: Release summary
        run: |
          VERSION="${VERSION#v}"
          PKG="@hookie-sh/cli@${VERSION}"
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.github_release.outputs.exists }}" = "true" ]; then
            echo "- GitHub Release: already existed (GoReleaser skipped)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- GitHub Release: https://github.com/hookie-sh/cli/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          fi
          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "- npm: \`$PKG\` (published)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- npm: \`$PKG\` staged — approve with \`npm stage approve $PKG\` or npmjs.com → Staged Packages" >> $GITHUB_STEP_SUMMARY
          fi
